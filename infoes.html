<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedMathLive</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="style.css" />

  <style>
    .offer-gallery {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 0 10px;
    }

    .offer-gallery img {
      width: 100%;
      display: block;
      border-radius: 20px;
    }

    .offer-gallery iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <div class="background-glow"></div>

  <main class="container">

    <section class="links-section">
      <div class="link-card">
        <div class="link-left">
          <div class="icon-box">
            <img src="images/offreinfo.png" class="custom-icon big-icon" alt="Info">
          </div>

          <div>
            <h3>Les informations de l’offre</h3>
            <p>Découvrez toutes les informations de l’offre</p>
          </div>
        </div>

        <a href="index.html" class="back-btn">‹ Retour</a>
      </div>
    </section>

    <div style="height:20px;"></div>

    <!-- ================= MEDIA DISPLAY ================= -->
    <section class="offer-gallery">

      <img src="images_infoes/1.jpg" alt="Image 1">

      <img src="images_infoes/2.jpg" alt="Image 2">

      <img src="images_infoes/3.jpg" alt="Image 3">

      <div class="video-container">
     <video width="640" height="360" controls>
  <source src="https://medmathlive.github.io/medmathlive/images_infoes/vid.mp4" type="video/mp4">
  Your browser does not support the video tag.
   </video>

    </section>

    <footer>
      <p>© 2026 MedMathLive | Tous droits réservés</p>
    </footer>

  </main>

</body>
</html>
